   <article>
        <h2>Form Pemesanan Kendaraan Rental</h2>
        <form action="" method="post">
            <fieldset>
                <legend>Formulir Pemesanan Kendaraan Rental</legend>
                <label for="nama">Nama Pemesanan:</label>
                <input type="text" required id="nama">
                <br>
                <label for="alamat">Alamat Pengiriman:</label>
                <input type="text" required id="alamat">
                <br>
                <label for="nomor_telepon">Nomor Telepon:</label>
                <input type="tel" required id="nomor_telepon">
                <br>
                <label for="tanggal">Tanggal Sewa:</label>
                <input type="date" name="tanggal" id="tanggal">
                <br>
                <label for="tanggal">Tanggal Pengembalian:</label>
                <input type="date" name="tanggal" id="tanggal">
                <br>
                <label for="jenis_kendaraan">Jenis Kendaraan:</label>
                <select name="jenis_kendaraan" id="jenis_kendaraan">
                    <option value="mobil">Mobil</option>
                    <option value="motor">Motor</option>
                </select>
                <br>
                <label for="model">Model Kendaraan:</label>
                <input type="text" name="model">
                <br>
                <label for="tanggal">Nomor Plat Kendaraan:</label>
                <input type="text" name="plat">
                <br>
                <label for="asuransi_tambahan">Asuransi Tambahan:</label>
                <select name="asuransi_tambahan" id="asuransi_tambahan">
                    <option value="ya">Ya</option>
                    <option value="tidak">Tidak</option>
                </select>
                <br>
                <label for="catatan">Catatan Khusus:</label>
                <input type="text" name="catatan">
                <br>
                <button type="submit">Kirim</button>
            </fieldset>
        </form>
   </article>
